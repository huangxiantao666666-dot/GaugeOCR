data:
  train_ann_file: "data/train_keypoints.json"
  val_ann_file: "data/val_keypoints.json"
  image_size: [448, 448]
  batch_size: 8
  num_workers: 4

model:
  deeplab_backbone: "mobilenet_v2"
  num_keypoints: 6

train:
  stage1:
    epochs: 30
    lr: 1.0e-4
    lr_decay: 1.0e-5
    weight_decay: 1.0e-4
    loss_weights:
      heatmap: 1.0
      dice: 0.1
    checkpoint_dir: "checkpoints/stage1"
    log_dir: "logs/stage1"
