# train_config.yaml
# YOLO26 仪表检测训练配置

# 模型配置
model: checkpoint/yolo26m.pt           # 预训练模型（自动下载）
# model: yolo26s.pt         # 或使用 larger 版本

# 数据集
data: detect_train_data.yaml

# 训练参数
epochs: 100                 # 训练轮数（1200张图100轮足够）
patience: 30                # 早停轮数（30轮不提升就停止）
batch: 16                   # 批次大小（根据GPU显存调整）
imgsz: 640                  # 输入图像尺寸

# 优化器
lr0: 0.005                  # 初始学习率（微调用小一点）
lrf: 0.01                   # 最终学习率因子
momentum: 0.937             # SGD动量
weight_decay: 0.0005        # 权重衰减

# 数据增强
mosaic: 0.8                 # Mosaic增强概率（降低避免过拟合）
mixup: 0.2                  # MixUp增强概率
copy_paste: 0.0             # 复制粘贴增强（检测任务不需要）
degrees: 0.0                # 旋转角度（仪表通常不需要旋转）
translate: 0.1              # 平移增强
scale: 0.5                  # 缩放增强
flipud: 0.0                 # 垂直翻转（仪表不需要）
fliplr: 0.5                 # 水平翻转概率
hsv_h: 0.015                # HSV色调增强
hsv_s: 0.7                  # HSV饱和度增强
hsv_v: 0.4                  # HSV明度增强

# 其他
device: 0                   # GPU设备（0代表第一块GPU，cpu代表CPU）
workers: 8                  # 数据加载线程数
project: runs/detect/meter  # 结果保存目录
name: train                 # 实验名称
exist_ok: True              # 覆盖已有结果
pretrained: True            # 使用预训练权重
resume: False               # 是否恢复训练
amp: True                   # 混合精度训练